<!DOCTYPE html>
<html>
<head>
  <title>For You 💖</title>

  <style>
    body {
      text-align: center;
      font-family: "Comic Sans MS", cursive;
      background: linear-gradient(#ffd6e0, #fff0f5);
      margin-top: 80px;
      overflow: hidden;
    }

    h1 {
      color: #ff4d88;
      font-size: 32px;
    }

    button {
      padding: 12px 22px;
      font-size: 18px;
      margin: 10px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
    }

    .yes {
      background-color: #ff66a3;
      color: white;
    }

    .no {
      background-color: #ccc;
    }

    #message {
      font-size: 22px;
      color: #ff3385;
      margin-top: 20px;
      white-space: pre-line;
    }

    .flower {
      position: absolute;
      font-size: 22px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { top: -10%; }
      100% { top: 110%; }
    }
  </style>
</head>

<body>

<h1 id="question">Tap start 💖</h1>

<button class="yes" onclick="startGame()">Start 🎀</button>

<div id="buttons"></div>
<p id="message"></p>

<script>

function startGame() {
  document.getElementById("question").innerHTML = "Do you wanna play with me? 🎮💗";

  document.getElementById("buttons").innerHTML = `
    <button class="yes" onclick="level1Yes()">Yes 💕</button>
    <button class="no" onclick="noReaction()">No 😤</button>
  `;
}

function noReaction() {
  document.getElementById("message").innerHTML = "No? 😭 try again… I think you pressed wrong 💔";
}

function level1Yes() {
  document.getElementById("message").innerHTML = "Yayyy 💖 let's gooo!";

  setTimeout(() => {
    document.getElementById("question").innerHTML = "Pick one 💗";
    document.getElementById("buttons").innerHTML = `
      <button class="yes" onclick="level2()">❤️ Heart</button>
      <button class="no" onclick="level2()">🌸 Flower</button>
    `;
  }, 1000);
}

function level2() {
  document.getElementById("question").innerHTML = "Last question 💕";
  document.getElementById("buttons").innerHTML = `
    <button class="yes" onclick="finalYes()">Yes 😍</button>
    <button class="no" onclick="noReaction()">No 😤</button>
  `;
}

function finalYes() {
  document.getElementById("question").innerHTML = "Awww 💗";
  document.getElementById("buttons").innerHTML = "";

  document.getElementById("message").innerHTML =
    "I love you so much 💖💖💖\n" +
    "You make my world better just by existing 🌸✨";

  setTimeout(showEndMessage, 2500);
}

function showEndMessage() {
  document.getElementById("question").innerHTML = "For you 💌";

  document.getElementById("message").innerHTML =
    "🌸 Now listen… 💗\n\n" +
    "Don’t be sad about what happened today.\n" +
    "I know you lost money, but it doesn’t define you.\n\n" +
    "You are still strong, still amazing, still you.\n" +
    "And I’m still here with you, okay? 💕";

}

/* flowers */
for (let i = 0; i < 30; i++) {
  let flower = document.createElement("div");
  flower.className = "flower";
  flower.innerHTML = "🌸";
  flower.style.left = Math.random() * 100 + "%";
  flower.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(flower);
}

</script>

</body>
</html>
